# MediaMTX: RTMP ingest + automatic recording + bridge to MoQ for live.
# Reference: https://github.com/bluenviron/mediamtx

logLevel: info

###############################################################################
# Inputs
###############################################################################

# Publishers (OBS, phones, ffmpeg) push here:
#   rtmp://<host>:1935/<stream-key>
rtmp: yes
rtmpAddress: :1935

# Republish each stream locally over RTSP so the MoQ bridge can read it.
# Not exposed outside the container.
rtsp: yes
rtspAddress: :8554

# Outputs we don't need: MoQ handles low-latency live playback.
hls: no
webrtc: no
srt: no

# Lightweight HTTP API for health / metrics (GET /v3/paths/list).
api: yes
apiAddress: :9997

###############################################################################
# Per-stream behavior (applies to every published stream)
###############################################################################

pathDefaults:
  # ---- Automatic recording to fragmented-MP4 segments ----
  # Recording starts the instant a stream goes live and is finalized the instant
  # it stops, because MediaMTX owns the exact RTMP connection lifecycle. This is
  # why recording lives at ingest rather than on a MoQ subscriber.
  record: yes
  recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S-%f
  recordFormat: fmp4
  recordPartDuration: 1s
  recordSegmentDuration: 6s
  recordDeleteAfter: 0s # keep forever; upload to object storage out-of-band

  # ---- Bridge each live stream into MoQ (low-latency playback) ----
  # When a publisher becomes ready, copy it into the relay as "<stream-key>.hang".
  # `-c copy` keeps H.264/AAC untouched (no re-encode), so this is cheap.
  # $MTX_PATH is the stream key; $MOQ_URL comes from the container environment.
  runOnReady: >
    ffmpeg -nostdin -hide_banner -loglevel warning
    -rtsp_transport tcp -i rtsp://127.0.0.1:8554/$MTX_PATH
    -c copy -f mp4 -movflags frag_keyframe+empty_moov+default_base_moof -
    | moq-cli publish --url "$MOQ_URL" --name "$MTX_PATH.hang" fmp4
  runOnReadyRestart: yes

###############################################################################
# Accept any stream key. Add explicit paths above pathDefaults for auth/limits.
###############################################################################

paths:
  all_others:
